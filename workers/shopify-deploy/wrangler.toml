name = "shopify-deploy"
main = "src/index.js"
compatibility_date = "2024-10-01"

# KV namespace for backups
[[kv_namespaces]]
binding = "BACKUPS"
id = "cb757685dc2440d8a04a6cc7c26f481a"

# Secrets (set via `wrangler secret put`):
#   SHOPIFY_CLIENT_SECRET — OAuth client secret from Shopify Dev Dashboard

[vars]
SHOPIFY_STORE = "thermolox.myshopify.com"
SHOPIFY_API_VERSION = "2024-10"
LIVE_THEME_ID = "185262768469"
SHOPIFY_CLIENT_ID = "7ccae9ba87df62af941e48603e96b5c2"
